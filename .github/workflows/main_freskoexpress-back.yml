# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - freskoexpress-back

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: 🔍 DEBUG - Mostrar secrets (solo para depuración)
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          echo "=== VALORES DE SECRETS (enmascarados por GitHub) ==="
          echo "DB_HOST: '${DB_HOST}'"
          echo "DB_PORT: '${DB_PORT}'"
          echo "DB_NAME: '${DB_NAME}'"
          echo "DB_USERNAME: '${DB_USERNAME}'"
          echo "DB_PASSWORD length: ${#DB_PASSWORD} caracteres"
          echo "JWT_SECRET length: ${#JWT_SECRET} caracteres"
          echo "===================================================="
          # Verificar si algún secret está vacío
          if [ -z "$DB_HOST" ]; then echo "❌ DB_HOST está VACÍO"; else echo "✅ DB_HOST tiene valor"; fi
          if [ -z "$DB_PORT" ]; then echo "❌ DB_PORT está VACÍO"; else echo "✅ DB_PORT tiene valor"; fi
          if [ -z "$DB_NAME" ]; then echo "❌ DB_NAME está VACÍO"; else echo "✅ DB_NAME tiene valor"; fi
          if [ -z "$DB_USERNAME" ]; then echo "❌ DB_USERNAME está VACÍO"; else echo "✅ DB_USERNAME tiene valor"; fi
          if [ -z "$DB_PASSWORD" ]; then echo "❌ DB_PASSWORD está VACÍO"; else echo "✅ DB_PASSWORD tiene valor"; fi
          if [ -z "$JWT_SECRET" ]; then echo "❌ JWT_SECRET está VACÍO"; else echo "✅ JWT_SECRET tiene valor"; fi

      - name: Build with Maven
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn clean install

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/target/*.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
  
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2063D0892AB941C1853B2F9E56BA6C0B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4DF9310027734B8682B960261B196F91 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7120E6E84CDD4F24899A7D349AA29FB2 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'freskoexpress-back'
          slot-name: 'Production'
          package: '*.jar'
          
